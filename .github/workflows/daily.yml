name: TrendForge Daily Pipeline

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

jobs:
  trend-forge:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout TrendForge repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run TrendForge pipeline
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
          GH_USERNAME: ${{ secrets.GH_USERNAME }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
        run: python src/main.py

      - name: Commit updated state files
        run: |
          git config user.name "TrendForge Bot"
          git config user.email "bot@trendforge"
          git add seen_repos.json run_log.json || true
          git diff --staged --quiet || git commit -m "chore: update seen repos and run log [skip ci]"
          git push
